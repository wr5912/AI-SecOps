version: '3.8'

services:
  # PostgreSQL - 关系型数据存储
  postgres:
    image: postgres:16-alpine
    container_name: ai-secops-postgres
    environment:
      POSTGRES_USER: secops
      POSTGRES_PASSWORD: secops_dev_password
      POSTGRES_DB: ai_secops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secops"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - 消息队列与缓存
  redis:
    image: redis:7-alpine
    container_name: ai-secops-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Neo4j - 知识图谱
  neo4j:
    image: neo4j:5-community
    container_name: ai-secops-neo4j
    environment:
      NEO4J_AUTH: neo4j/secops_neo4j_password
      NEO4J_PLUGINS: '["apoc", "gds"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - ./neo4j-seed.cypher:/seed.cypher

  # 后端API (开发模式)
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    container_name: ai-secops-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://secops:secops_dev_password@postgres:5432/ai_secops
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_AUTH=neo4j/secops_neo4j_password
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - ../../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started

  # 前端 (开发模式)
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    container_name: ai-secops-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    volumes:
      - ../../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  neo4j_data: